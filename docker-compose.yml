services:
  scoop:
    build: .
    image: scoop:latest
    container_name: scoop
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
    volumes:
      # Point this at a TrueNAS dataset, e.g. /mnt/<pool>/apps/scoop/data
      - ./data:/app/data
